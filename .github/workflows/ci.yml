name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Lint, Test & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Test
        run: npm test -- --ci --coverage

      - name: Build (Chrome)
        run: node build.js --target chrome

      - name: Build (Firefox)
        run: node build.js --target firefox

      - name: Verify build outputs
        run: |
          test -f dist/chrome/manifest.json || (echo "Chrome build missing manifest.json" && exit 1)
          test -f dist/firefox/manifest.json || (echo "Firefox build missing manifest.json" && exit 1)
          echo "Build outputs verified."
